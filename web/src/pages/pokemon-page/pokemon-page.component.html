<div class="pokemon-header">
  <mat-form-field>
    <mat-label>Number of Pokémon</mat-label>
    <mat-select [formControl]="numberSelected">
      <ng-container *ngFor="let number of numbers">
        <mat-option [value]="number">{{ number }}</mat-option>
      </ng-container>
    </mat-select>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Generation</mat-label>
    <mat-select [formControl]="genSelected">
      <mat-option [value]="0">{{ "None" }}</mat-option>
      <ng-container *ngFor="let gen of gens">
        <mat-option [value]="gen.value">{{ gen.label }}</mat-option>
      </ng-container>
    </mat-select>
  </mat-form-field>

  <!-- <mat-form-field>
    <mat-label>Region</mat-label>
    <mat-select [formControl]="regionSelected">
      <mat-option [value]="0">{{ "None" }}</mat-option>
      <ng-container *ngFor="let region of regions">
        <mat-option [value]="region.value">{{ region.label }}</mat-option>
      </ng-container>
    </mat-select>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Type</mat-label>
    <mat-select [formControl]="typeSelected">
      <mat-option [value]="0">{{ "None" }}</mat-option>
      <ng-container *ngFor="let type of types">
        <mat-option [value]="type.value">{{ type.label }}</mat-option>
      </ng-container>
    </mat-select>
  </mat-form-field> -->

  <button class="btn btn-lg btn-default" (click)="generatePokemon()">
    Generate
  </button>
</div>

<div class="pokemon-list">
  <ng-container *ngFor="let poke of pokemon">
    <pokemon-card [pokemon]="poke"> </pokemon-card>
  </ng-container>
</div>
